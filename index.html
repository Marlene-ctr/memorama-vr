<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Memorama VR Meta</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script>

// ===== IMAGENES =====
const cardImages = [
"img/carta1.jpg",
"img/carta2.jpg",
"img/carta3.jpg",
"img/carta4.jpg",
"img/carta5.jpg"
];

const backImage = "img/reverso.jpg";

let shuffledPairs=[];

function shufflePairs(){
shuffledPairs=[];
for(let i=0;i<cardImages.length;i++){
shuffledPairs.push(i+1);
shuffledPairs.push(i+1);
}
for(let i=shuffledPairs.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[shuffledPairs[i],shuffledPairs[j]]=[shuffledPairs[j],shuffledPairs[i]];
}
}

let firstCard=null;
let secondCard=null;
let lockBoard=false;

let score=0;
let timeLeft=120;
let timerInterval;
let gameStarted=false;
let gameOver=false;


// ===== INICIAR JUEGO =====
function startGame(){

document.querySelector("#startScreen").setAttribute("visible",false);

gameStarted=true;

shufflePairs();

const cards=document.querySelectorAll("[card]");

cards.forEach((card,index)=>{
let pairNumber=shuffledPairs[index];
card.setAttribute("card","pair:"+pairNumber);

let frontPlane=card.querySelectorAll("a-plane")[0];
let backPlane=card.querySelectorAll("a-plane")[1];

frontPlane.setAttribute("src", backImage);
backPlane.setAttribute("src",cardImages[pairNumber-1]);
});

startTimer();

// 🎵 TU MUSICA (HTML REAL - FUNCIONA SIEMPRE)
let music = document.querySelector("#bgMusic");
music.volume = 0.7;
music.play();

}


// ===== COMPONENTE CARTA =====
AFRAME.registerComponent('card',{
schema:{pair:{type:'int'}},

init:function(){

this.flipped=false;

this.el.addEventListener('click',()=>{

if(!gameStarted || lockBoard || this.flipped || gameOver) return;

this.flip();

if(!firstCard){
firstCard=this;
return;
}

secondCard=this;
lockBoard=true;

checkMatch();

});

},

flip:function(){
this.flipped=true;
this.el.setAttribute("animation",{property:"rotation",to:"0 180 0",dur:400});
},

unflip:function(){
this.flipped=false;
this.el.setAttribute("animation",{property:"rotation",to:"0 0 0",dur:400});
}

});


// ===== MATCH =====
function checkMatch(){

if(firstCard.data.pair===secondCard.data.pair){

score++;

document.querySelector("#score")
.setAttribute("value","Puntos: "+score);

setTimeout(()=>{

firstCard.el.setAttribute("visible",false);
secondCard.el.setAttribute("visible",false);

if(score==5){

document.querySelector("#message")
.setAttribute("value","GANASTE 🎉");

document.querySelector("#winSound").components.sound.playSound();

clearInterval(timerInterval);
gameOver=true;

setTimeout(restartGame,5000);

}

resetBoard();

},500);

}else{

setTimeout(()=>{
firstCard.unflip();
secondCard.unflip();
resetBoard();
},1000);

}

}

function resetBoard(){
firstCard=null;
secondCard=null;
lockBoard=false;
}


// ===== TIMER =====
function startTimer(){

timerInterval=setInterval(()=>{

timeLeft--;

let minutes=Math.floor(timeLeft/60);
let seconds=timeLeft%60;

document.querySelector("#timer")
.setAttribute("value","Tiempo: "+minutes+":"+seconds.toString().padStart(2,'0'));

if(timeLeft<=0){

clearInterval(timerInterval);
gameOver=true;

document.querySelector("#message")
.setAttribute("value","PERDISTE ⏰");

setTimeout(restartGame,5000);

}

},1000);

}


// ===== RESTART =====
function restartGame(){

score=0;
timeLeft=120;
gameOver=false;
gameStarted=false;

document.querySelector("#score").setAttribute("value","Puntos: 0");
document.querySelector("#message").setAttribute("value","");

clearInterval(timerInterval);
}

</script>
</head>

<body>

<a-scene 
background="color:#050505"
xr-mode-ui="enabled: true"
webxr="referenceSpaceType: local-floor"
renderer="antialias: true">

<!-- 🎵 AUDIO REAL -->
<audio id="bgMusic" src="img/bittersuite_clip.mp3" preload="auto" loop></audio>

<!-- SONIDO GANAR -->
<a-entity id="winSound"
sound="src:https://cdn.pixabay.com/audio/2022/10/16/audio_12c6f4df6a.mp3">
</a-entity>

<!-- CAMARA -->
<a-camera position="0 1.6 8">
<a-cursor fuse="true" fuse-timeout="2000" color="yellow"></a-cursor>
</a-camera>

<!-- CONTROLES VR -->
<a-entity laser-controls="hand: right" raycaster="objects: .clickable" line="color: yellow"></a-entity>
<a-entity laser-controls="hand: left" raycaster="objects: .clickable" line="color: yellow"></a-entity>

<!-- LUCES -->
<a-light type="ambient" intensity="0.7"></a-light>
<a-light type="point" position="0 5 5"></a-light>

<!-- UI -->
<a-text id="timer" value="Tiempo: 2:00" position="-3 4 -3" color="red"></a-text>
<a-text id="score" value="Puntos: 0" position="1 4 -3" color="cyan"></a-text>
<a-text id="message" value="" position="-1 4.8 -3" color="yellow"></a-text>

<!-- BOTON START -->
<a-entity id="startScreen" position="0 2 -3">

    <a-plane class="clickable"
        width="2.5" height="0.8"
        color="#ffd400"
        material="shader: standard; emissive: #ffcc00; emissiveIntensity: 0.8"
        animation="property: scale; dir: alternate; dur: 900; loop: true; to: 1.05 1.05 1"
        event-set__enter="_event:mouseenter; color:#fff066; material.emissive:#ffff00"
        event-set__leave="_event:mouseleave; color:#ffd400; material.emissive:#ffcc00"
        onclick="startGame()">
    </a-plane>

    <a-text 
        value="START"
        align="center"
        position="0 0 0.05"
        color="#ff0000"
        width="6"
        animation="property: scale; dir: alternate; dur: 700; loop: true; to: 1.1 1.1 1">
    </a-text>

</a-entity>

<a-plane rotation="-90 0 0" width="20" height="20" color="#1a1a1a"></a-plane>

<!-- CARTAS -->
<a-entity card class="clickable" position="-4 3 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>
<a-entity card class="clickable" position="-2 3 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>
<a-entity card class="clickable" position="0 3 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>
<a-entity card class="clickable" position="2 3 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>
<a-entity card class="clickable" position="4 3 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>

<a-entity card class="clickable" position="-4 1.2 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>
<a-entity card class="clickable" position="-2 1.2 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>
<a-entity card class="clickable" position="0 1.2 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>
<a-entity card class="clickable" position="2 1.2 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>
<a-entity card class="clickable" position="4 1.2 -4"><a-plane width="1" height="1.5"></a-plane><a-plane rotation="0 180 0" width="1" height="1.5"></a-plane></a-entity>

</a-scene>

</body>
</html>
